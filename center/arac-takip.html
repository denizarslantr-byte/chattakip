<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Piano Deri — Araç Takip</title>
<link rel="stylesheet" href="../assets/piano-theme.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
body{margin:0;overflow:hidden;background:var(--bg,#0d0d0d);color:var(--text,#e8e0d0);font-family:'Segoe UI',sans-serif;}
/* ── Header ── */
#topBar{height:44px;background:var(--panel,#1a1a1a);border-bottom:1px solid #333;display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;}
#topBar .logo{color:var(--gold,#c9a84c);font-size:13px;font-weight:700;letter-spacing:2px;}
#topBar .sub{font-size:10px;color:#555;letter-spacing:1px;text-transform:uppercase;}
.top-spacer{flex:1;}
.btn-sm-top{background:#2a2a2a;border:1px solid #444;color:var(--text,#e8e0d0);padding:5px 12px;border-radius:5px;cursor:pointer;font-size:12px;}
.btn-sm-top:hover{border-color:var(--gold,#c9a84c);}
/* ── Nav ── */
#nav{height:40px;background:var(--panel,#1a1a1a);border-bottom:1px solid #222;display:flex;align-items:center;padding:0 12px;gap:6px;flex-shrink:0;}
.nav-btn{background:transparent;border:none;color:#888;padding:6px 13px;border-radius:5px;cursor:pointer;font-size:12px;transition:all .2s;}
.nav-btn:hover{background:#2a2a2a;color:var(--text,#e8e0d0);}
.nav-btn.active{background:var(--gold,#c9a84c);color:#000;font-weight:700;}
/* ── Layout ── */
#mainLayout{display:flex;height:calc(100vh - 84px);}
/* ── Left Panel ── */
#leftPanel{width:310px;background:var(--panel,#1a1a1a);border-right:1px solid #222;display:flex;flex-direction:column;overflow:hidden;}
#panelHead{padding:10px 12px 6px;border-bottom:1px solid #2a2a2a;flex-shrink:0;}
#panelHead h3{margin:0 0 6px;font-size:13px;color:var(--gold,#c9a84c);letter-spacing:1px;}
.stats-row{display:flex;gap:0;}
.stat-box{flex:1;text-align:center;padding:6px 4px;border-right:1px solid #2a2a2a;}
.stat-box:last-child{border-right:none;}
.stat-box .n{font-size:20px;font-weight:700;color:var(--gold,#c9a84c);}
.stat-box .l{font-size:9px;color:#666;text-transform:uppercase;margin-top:1px;}
.stat-box.red .n{color:#ef4444;}
/* ── Alerts strip ── */
#alertStrip{flex-shrink:0;max-height:100px;overflow-y:auto;border-bottom:1px solid #2a2a2a;}
.al-item{display:flex;gap:8px;align-items:center;padding:6px 12px;border-bottom:1px solid #1a1a1a;animation:fadeIn .4s;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.al-item .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.al-mag .dot{background:#c9a84c;}
.al-otel .dot{background:#60a5fa;}
.al-item .al-msg{font-size:11px;flex:1;}
.al-item .al-time{font-size:10px;color:#555;flex-shrink:0;}
/* ── Vehicle list ── */
#vehicleList{flex:1;overflow-y:auto;padding:8px;}
.vc{background:#111;border:1px solid #2a2a2a;border-radius:8px;padding:9px 11px;margin-bottom:7px;cursor:pointer;transition:border-color .2s;}
.vc:hover{border-color:#444;}
.vc.hareket{border-left:3px solid #4ade80;}
.vc.bekliyor{border-left:3px solid #fbbf24;}
.vc.uyari{border-left:3px solid #ef4444;background:#1a0505;}
.vc-top{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.vc-plate{font-size:13px;font-weight:700;letter-spacing:1px;}
.vc-badge{font-size:10px;padding:2px 7px;border-radius:99px;font-weight:600;margin-left:auto;}
.vc-badge.h{background:#14532d;color:#4ade80;}
.vc-badge.b{background:#713f12;color:#fbbf24;}
.vc-badge.u{background:#7f1d1d;color:#fca5a5;}
.vc-metrics{display:flex;gap:10px;font-size:11px;color:#888;}
.vc-metrics span{display:flex;align-items:center;gap:3px;}
.vc-dist{font-size:10px;color:#555;margin-top:4px;}
.vc-model{font-size:10px;color:#555;}
/* ── Daily km footer ── */
#dailyKm{flex-shrink:0;padding:8px 12px;border-top:1px solid #222;font-size:11px;color:#888;display:flex;justify-content:space-between;}
/* ── Map ── */
#map{flex:1;z-index:0;}
/* ── Right Panel ── */
#rightPanel{width:210px;background:var(--panel,#1a1a1a);border-left:1px solid #222;display:flex;flex-direction:column;overflow:hidden;font-size:12px;}
.rp-section{padding:10px 12px;border-bottom:1px solid #222;}
.rp-title{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.staff-pills{display:flex;flex-wrap:wrap;gap:4px;}
.pill{padding:3px 8px;border-radius:99px;font-size:11px;font-weight:600;background:#1e3a5f;color:#93c5fd;}
.pill.off{background:#1a1a1a;color:#555;border:1px solid #333;}
.rp-count{font-size:10px;color:#555;margin-top:4px;}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.sg{background:#111;border-radius:6px;padding:7px;text-align:center;}
.sg .sv{font-size:16px;font-weight:700;color:var(--gold,#c9a84c);}
.sg .sl{font-size:9px;color:#666;text-transform:uppercase;}
/* ── Auto badge ── */
#autoRefreshBadge{font-size:10px;color:#555;display:flex;align-items:center;gap:4px;}
#autoRefreshBadge .dot{width:6px;height:6px;border-radius:50%;background:#4ade80;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
/* ── Map markers ── */
.car-marker{
  background: var(--mc, #4ade80);
  color: #000;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 4px;
  white-space: nowrap;
  box-shadow: 0 2px 6px rgba(0,0,0,.5);
  border: 1.5px solid rgba(255,255,255,.3);
  letter-spacing:.5px;
}
.store-marker{font-size:20px;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,.7));}
.hotel-marker{font-size:16px;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,.7));}
/* ── Toast ── */
#toast{position:fixed;top:16px;right:20px;background:#1a1a1a;border:1px solid var(--gold,#c9a84c);color:var(--text,#e8e0d0);padding:10px 18px;border-radius:8px;font-size:12px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;}
/* ── Login overlay ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;z-index:200;}
.login-box{background:var(--panel,#1a1a1a);border:1px solid var(--gold,#c9a84c);border-radius:14px;padding:40px;min-width:280px;text-align:center;}
.login-box h2{color:var(--gold,#c9a84c);margin:0 0 20px;font-size:17px;}
.login-box input{background:#111;border:1px solid #444;color:var(--text,#e8e0d0);padding:10px;border-radius:6px;font-size:18px;letter-spacing:8px;text-align:center;width:100%;box-sizing:border-box;margin-bottom:14px;}
.login-box button{background:var(--gold,#c9a84c);color:#000;border:none;padding:9px;border-radius:6px;cursor:pointer;font-weight:700;width:100%;}
</style>
</head>
<body>

<!-- Login Overlay -->
<div id="loginOverlay" class="overlay">
  <div class="login-box">
    <h2>P  PIANO DERİ</h2>
    <input type="password" id="pinInput" placeholder="Merkez PIN" maxlength="8">
    <button onclick="checkCenterPin()">Giriş</button>
    <p id="pinErr" style="color:#ef4444;font-size:12px;margin-top:8px;display:none">Hatalı PIN</p>
  </div>
</div>

<!-- Top Bar -->
<div id="topBar">
  <div>
    <div class="logo">P  PIANO DERİ</div>
    <div class="sub">MERKEZ OPERASYON — V6.1</div>
  </div>
  <div class="top-spacer"></div>
  <div id="autoRefreshBadge"><div class="dot"></div> OTO: AÇIK</div>
  <button class="btn-sm-top" onclick="manualRefresh()">↺ Yenile</button>
  <button class="btn-sm-top" onclick="window.location='dashboard.html'">⬅ Dashboard</button>
  <button class="btn-sm-top" onclick="logout()">⏏ Çıkış</button>
</div>

<!-- Nav -->
<div id="nav">
  <button class="nav-btn" onclick="window.location='dashboard.html'">🏠 Ana Ekran</button>
  <button class="nav-btn" onclick="window.location='dashboard.html'">✏️ Elle Rezervasyon</button>
  <button class="nav-btn" onclick="window.location='dashboard.html'">📊 Raporlar</button>
  <button class="nav-btn" onclick="window.location='dashboard.html'">👥 Personeller</button>
  <button class="nav-btn" onclick="window.location='dashboard.html'">🏖 İzin Girişi</button>
  <button class="nav-btn active">🛰 Araç Takip</button>
  <div style="flex:1"></div>
  <span id="lastUpdate" style="font-size:10px;color:#555"></span>
</div>

<!-- Main Layout -->
<div id="mainLayout">

  <!-- LEFT PANEL -->
  <div id="leftPanel">
    <div id="panelHead">
      <h3>📍 ARAÇ TAKİP — <span id="regionName">Kemer Bölgesi</span></h3>
      <div class="stats-row">
        <div class="stat-box"><div class="n" id="sHareket">0</div><div class="l">Hareket</div></div>
        <div class="stat-box"><div class="n" id="sBekliyor">0</div><div class="l">Bekliyor</div></div>
        <div class="stat-box red"><div class="n" id="sUyari">0</div><div class="l">Uyarı</div></div>
        <div class="stat-box"><div class="n" id="sTotal">0</div><div class="l">Toplam</div></div>
      </div>
    </div>
    <div id="alertStrip"></div>
    <div id="vehicleList"><div style="color:#555;padding:20px;text-align:center;font-size:12px">Araç verisi bekleniyor...</div></div>
    <div id="dailyKm">
      <span>⏱ <span id="sinceText">—</span></span>
      <span>📏 Toplam: <span id="totalDailyKm">0</span> km</span>
    </div>
  </div>

  <!-- MAP -->
  <div id="map"></div>

  <!-- RIGHT PANEL -->
  <div id="rightPanel">
    <div class="rp-section">
      <div class="rp-title">PERSONEL — <span id="rpDate"></span></div>
      <div class="rp-title" style="margin-top:8px">BOŞTA (<span id="rpBostaCount">0</span>)</div>
      <div id="rpBosta" class="staff-pills"></div>
    </div>
    <div class="rp-section">
      <div class="rp-title">PROGRAMDA (<span id="rpProgramda">0</span>)</div>
      <div class="rp-title" style="margin-top:6px">İZİNLİ (<span id="rpIzin">0</span>)</div>
    </div>
    <div class="rp-section">
      <div class="rp-title">GÜNLÜK ÖZET</div>
      <div class="summary-grid">
        <div class="sg"><div class="sv" id="rpRez">0</div><div class="sl">Rezervasyon</div></div>
        <div class="sg"><div class="sv" id="rpPax">0</div><div class="sl">Pax</div></div>
        <div class="sg"><div class="sv" id="rpIceri">0</div><div class="sl">İçeride</div></div>
        <div class="sg"><div class="sv" id="rpTam">0</div><div class="sl">Tamamlandı</div></div>
      </div>
    </div>
  </div>

</div>

<div id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="../config/firebase.js"></script>
<script src="../config/config.js"></script>
<script>
// ════════════════════════════════════════════════════════════════
// AUTH
// ════════════════════════════════════════════════════════════════
const FB_BASE = (typeof FIREBASE_CONFIG !== 'undefined')
  ? FIREBASE_CONFIG.databaseURL
  : 'https://rezervasyon-3f1b7-default-rtdb.europe-west1.firebasedatabase.app';

function checkCenterPin() {
  const pin = document.getElementById('pinInput').value.trim();
  // Mevcut center panel ile aynı PIN kontrolü — localStorage'da 'center_token' varsa geç
  // Basit kontrol: PIN'i API üzerinden doğrula veya localStorage kontrolü yap
  fetch(`${API_URL}?action=checkPin&pin=${encodeURIComponent(pin)}&apiKey=${API_KEY}`)
    .then(r => r.json())
    .then(d => {
      if (d && d.ok) {
        localStorage.setItem('center_token', pin);
        document.getElementById('loginOverlay').style.display = 'none';
        initTracking();
      } else {
        document.getElementById('pinErr').style.display = 'block';
      }
    })
    .catch(() => {
      // API doğrulama yoksa localStorage'daki token'ı kabul et
      if (localStorage.getItem('center_token')) {
        document.getElementById('loginOverlay').style.display = 'none';
        initTracking();
      } else {
        localStorage.setItem('center_token', pin);
        document.getElementById('loginOverlay').style.display = 'none';
        initTracking();
      }
    });
}

function logout() {
  localStorage.removeItem('center_token');
  window.location.reload();
}

document.getElementById('pinInput').addEventListener('keydown', e => { if (e.key === 'Enter') checkCenterPin(); });

// ════════════════════════════════════════════════════════════════
// MAP INIT
// ════════════════════════════════════════════════════════════════
let map, markers = {}, storeMarker = null, hotelMarkers = {};

function initMap() {
  map = L.map('map', { zoomControl: true, attributionControl: false }).setView([36.576, 30.556], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(map);

  // Scale
  L.control.scale({ imperial: false, position: 'bottomright' }).addTo(map);
}

// ════════════════════════════════════════════════════════════════
// FIREBASE — Gerçek zamanlı konum dinleme (SSE)
// ════════════════════════════════════════════════════════════════
let konumlarSSE = null, uyarilarSSE = null;

function startFirebaseListen() {
  // Konum dinle
  if (konumlarSSE) konumlarSSE.close();
  konumlarSSE = new EventSource(`${FB_BASE}/arac_takip/konumlar.json`);
  konumlarSSE.addEventListener('put', e => {
    try { const d = JSON.parse(e.data); if (d && d.data) renderVehicles(d.data); } catch(err){}
  });
  konumlarSSE.addEventListener('patch', e => {
    try { const d = JSON.parse(e.data); if (d && d.data) renderVehicles(d.data); } catch(err){}
  });

  // Uyarı dinle
  if (uyarilarSSE) uyarilarSSE.close();
  uyarilarSSE = new EventSource(`${FB_BASE}/arac_takip/uyarilar.json`);
  uyarilarSSE.addEventListener('put', e => {
    try { const d = JSON.parse(e.data); if (d && d.data) renderAlerts(d.data); } catch(err){}
  });

  // Araç tanımları + otel/mağaza konumları yükle
  loadStaticData().then(() => startLiveApiLoop());
}

// ════════════════════════════════════════════════════════════════
// STATİK VERİ
// ════════════════════════════════════════════════════════════════
let vehicleDefs = {}, hotelKonumlar = {}, merkezMagaza = null;

async function loadStaticData() {
  try {
    const [defs, otels, merkez] = await Promise.all([
      fbGet('arac_takip/araclar'),
      fbGet('arac_takip/otel_konumlar'),
      fbGet('arac_takip/merkez_magaza')
    ]);
    vehicleDefs   = defs   || {};
    hotelKonumlar = otels  || {};
    merkezMagaza  = merkez || null;

    // Mağaza marker
    if (merkezMagaza && merkezMagaza.lat && merkezMagaza.lng) {
      if (storeMarker) storeMarker.remove();
      storeMarker = L.marker([merkezMagaza.lat, merkezMagaza.lng], {
        icon: L.divIcon({ html: '<div class="store-marker">🏬</div>', className:'', iconAnchor:[10,20] })
      }).addTo(map).bindPopup(`<b>${merkezMagaza.ad||'Merkez Mağaza'}</b><br>Uyarı: ${merkezMagaza.yaklasma_m||500}m`);

      // Yakınlık çemberi
      L.circle([merkezMagaza.lat, merkezMagaza.lng], {
        radius: merkezMagaza.yaklasma_m || 500,
        color: '#c9a84c', fillColor: '#c9a84c', fillOpacity: 0.05, weight: 1, dashArray: '4'
      }).addTo(map);
    }

    // Otel marker'ları
    Object.entries(hotelKonumlar).forEach(([key, ok]) => {
      if (!ok || !ok.lat || !ok.lng) return;
      if (hotelMarkers[key]) hotelMarkers[key].remove();
      hotelMarkers[key] = L.marker([ok.lat, ok.lng], {
        icon: L.divIcon({ html: '<div class="hotel-marker">🏨</div>', className:'', iconAnchor:[8,16] })
      }).addTo(map).bindPopup(`<b>${ok.otel_adi||key}</b><br>Uyarı: ${ok.yaklasma_m||300}m`);

      L.circle([ok.lat, ok.lng], {
        radius: ok.yaklasma_m || 300,
        color: '#60a5fa', fillColor: '#60a5fa', fillOpacity: 0.05, weight: 1, dashArray: '4'
      }).addTo(map);
    });

  } catch(e) { console.warn('loadStaticData:', e); }
}

// ════════════════════════════════════════════════════════════════
// ARAÇ RENDER
// ════════════════════════════════════════════════════════════════
let lastKonumlar = {};

function renderVehicles(konumlar) {
  lastKonumlar = konumlar || {};
  document.getElementById('lastUpdate').textContent = '↻ ' + new Date().toLocaleTimeString('tr-TR');

  const list = Object.entries(lastKonumlar).filter(([,v]) => v && v.lat);
  const hareket  = list.filter(([,v]) => v.durum === 'HAREKET').length;
  const bekliyor = list.filter(([,v]) => v.durum !== 'HAREKET').length;
  const uyariCount = parseInt(document.getElementById('sUyari').textContent) || 0;

  document.getElementById('sHareket').textContent = hareket;
  document.getElementById('sBekliyor').textContent= bekliyor;
  document.getElementById('sTotal').textContent   = list.length;

  // Toplam günlük km
  const totalKm = list.reduce((s,[,v]) => s + (parseInt(v.km)||0), 0);
  document.getElementById('totalDailyKm').textContent = totalKm.toLocaleString('tr-TR');
  document.getElementById('sinceText').textContent = new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});

  // Araç listesi
  const listEl = document.getElementById('vehicleList');
  if (!list.length) {
    listEl.innerHTML = '<div style="color:#555;padding:20px;text-align:center;font-size:12px">Araç konumu alınamadı.<br>Apps Script trigger çalışıyor mu?</div>';
    return;
  }

  // Uzaklık hesapla (bilgi amaçlı)
  const withDist = list.map(([plaka, v]) => {
    let dist = null;
    if (merkezMagaza && merkezMagaza.lat) dist = haversine(v.lat, v.lng, merkezMagaza.lat, merkezMagaza.lng);
    return { plaka, v, dist };
  }).sort((a,b) => (a.v.durum === 'HAREKET' ? -1 : 1));

  listEl.innerHTML = withDist.map(({ plaka, v, dist }) => {
    const def    = Object.values(vehicleDefs).find(d => d.kisa_plaka === plaka) || {};
    const cls    = v.durum === 'HAREKET' ? 'hareket' : 'bekliyor';
    const badge  = v.durum === 'HAREKET'
      ? '<span class="vc-badge h">Hareket</span>'
      : '<span class="vc-badge b">Bekliyor</span>';
    const distTxt = dist !== null ? `🏬 ${Math.round(dist)}m` : '';
    return `<div class="vc ${cls}" onclick="focusVehicle('${plaka}')">
      <div class="vc-top">
        <div class="vc-plate">${plaka}</div>
        ${badge}
      </div>
      <div class="vc-model">${def.model||''}</div>
      <div class="vc-metrics">
        <span>⚡ ${v.hiz||0} km/s</span>
        <span>📏 ${v.km||0} km</span>
      </div>
      ${distTxt ? `<div class="vc-dist">${distTxt} mağazaya</div>` : ''}
    </div>`;
  }).join('');

  // Harita marker'larını güncelle
  list.forEach(([plaka, v]) => {
    const color = v.durum === 'HAREKET' ? '#4ade80' : '#fbbf24';
    const iconHtml = `<div class="car-marker" style="--mc:${color}">${plaka}</div>`;
    const icon = L.divIcon({ html: iconHtml, className: '', iconAnchor: [30, 10] });

    if (markers[plaka]) {
      markers[plaka].setLatLng([v.lat, v.lng]).setIcon(icon);
    } else {
      markers[plaka] = L.marker([v.lat, v.lng], { icon })
        .addTo(map)
        .bindPopup(`<b>${plaka}</b><br>Hız: ${v.hiz||0} km/s<br>KM: ${v.km||0}<br>${v.guncelleme||''}`);
    }
  });

  // Haritayı tüm araçları gösterecek şekilde ayarla (ilk yüklemede)
  if (!window._mapFitted && list.length > 0) {
    window._mapFitted = true;
    const bounds = L.latLngBounds(list.map(([,v]) => [v.lat, v.lng]));
    if (bounds.isValid()) map.fitBounds(bounds.pad(0.3));
  }
}

function focusVehicle(plaka) {
  if (markers[plaka]) {
    map.setView(markers[plaka].getLatLng(), 16);
    markers[plaka].openPopup();
  }
}

// ════════════════════════════════════════════════════════════════
// UYARI RENDER
// ════════════════════════════════════════════════════════════════
let shownAlerts = new Set();

function renderAlerts(uyarilar) {
  if (!uyarilar) return;
  const unread = Object.entries(uyarilar).filter(([,v]) => v && !v.okundu)
    .sort((a,b) => new Date(b[1].zaman||0) - new Date(a[1].zaman||0))
    .slice(0, 5);

  document.getElementById('sUyari').textContent = unread.length;
  const strip = document.getElementById('alertStrip');
  if (!unread.length) { strip.innerHTML = ''; return; }

  strip.innerHTML = unread.map(([id,v]) => {
    const isMag = v.tip === 'MAGAZA_YAKIN';
    const icon  = isMag ? '🏬' : '🏨';
    return `<div class="al-item ${isMag?'al-mag':'al-otel'}">
      <div class="dot"></div>
      <div class="al-msg">${icon} ${v.mesaj||'—'}</div>
      <div class="al-time">${v.zaman ? new Date(v.zaman).toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'}) : ''}</div>
    </div>`;
  }).join('');

  // Yeni uyarı bildirimi
  unread.forEach(([id,v]) => {
    if (!shownAlerts.has(id)) {
      shownAlerts.add(id);
      showToast((v.tip==='MAGAZA_YAKIN'?'🏬':'🏨') + ' ' + (v.mesaj||'Yeni uyarı'));
    }
  });
}



// ════════════════════════════════════════════════════════════════
// CANLI API OKUMA — Render/Vercel API'den araç konumlarını direkt çeker
// Not: URL ayarlardan kök olarak girildiyse otomatik /api/tnb ekler.
// ════════════════════════════════════════════════════════════════
let liveApiTimer = null;

function findSavedApiUrl() {
  const candidates = [];
  try {
    const lsKeys = ['aracTakipSettings','piano_arac_takip_settings','piano_arac_settings','tnbApiUrl','firebaseFunctionUrl'];
    for (const k of lsKeys) {
      const raw = localStorage.getItem(k);
      if (!raw) continue;
      try {
        const o = JSON.parse(raw);
        candidates.push(o.firebaseFunctionUrl, o.functionUrl, o.apiUrl, o.tnbApiUrl, o.url);
      } catch(_) { candidates.push(raw); }
    }
    for (let i=0;i<localStorage.length;i++) {
      const v = localStorage.getItem(localStorage.key(i)) || '';
      const m = v.match(/https?:\/\/[^"'\s]+onrender\.com[^"'\s]*/i) || v.match(/https?:\/\/[^"'\s]+vercel\.app[^"'\s]*/i);
      if (m) candidates.push(m[0]);
    }
  } catch(e) {}
  const first = candidates.filter(Boolean).map(String).find(u => /^https?:\/\//i.test(u));
  return normalizeApiUrl(first || 'https://chattakip-api.onrender.com/api/tnb');
}

function normalizeApiUrl(url) {
  url = String(url || '').trim();
  if (!url) return '';
  url = url.replace(/\/+$/,'');
  if (!/\/api\/tnb$/i.test(url) && /onrender\.com|vercel\.app/i.test(url)) url += '/api/tnb';
  return url;
}

function normalizePlate(v) { return String(v||'').replace(/\s+/g,'').replace(/[^A-Z0-9]/gi,'').toUpperCase(); }

async function loadApiUrlFromFirebase() {
  try {
    const ayar = await fbGet('arac_takip/ayarlar');
    const url = ayar && (ayar.firebaseFunctionUrl || ayar.functionUrl || ayar.apiUrl || ayar.tnbApiUrl || ayar.url);
    return normalizeApiUrl(url) || findSavedApiUrl();
  } catch(e) { return findSavedApiUrl(); }
}

function parseXmlVehicles(text) {
  const doc = new DOMParser().parseFromString(text, 'text/xml');
  const all = Array.from(doc.getElementsByTagName('*'));
  const groups = all.filter(el => {
    const names = Array.from(el.children).map(c => c.localName.toLowerCase());
    return names.some(n => ['plaka','enlem','lat','latitude'].includes(n)) && names.some(n => ['boylam','lng','lon','longitude'].includes(n));
  });
  return groups.map(el => {
    const get = (...names) => {
      for (const n of names) {
        const c = Array.from(el.children).find(x => x.localName.toLowerCase() === n.toLowerCase());
        if (c) return c.textContent.trim();
      }
      return '';
    };
    return {
      plaka: get('Plaka','plaka','PLAKA','AracPlaka','aracPlaka'),
      cihaz_id: get('CihazId','cihazId','CihazID','ID'),
      lat: get('Enlem','Lat','Latitude','lat'),
      lng: get('Boylam','Lng','Lon','Longitude','lng'),
      hiz: get('Hiz','Speed','hiz'),
      km: get('Km','KmSayaci','km'),
      yon: get('Yon','Direction','yon'),
      zaman: get('Zaman','Time','Tarih','tarih')
    };
  }).filter(x => x.plaka || x.cihaz_id);
}

function flattenVehiclesJson(data) {
  if (!data) return [];
  if (Array.isArray(data)) return data;
  if (Array.isArray(data.vehicles)) return data.vehicles;
  if (Array.isArray(data.data)) return data.data;
  if (Array.isArray(data.araclar)) return data.araclar;
  if (data.result) return flattenVehiclesJson(data.result);
  return Object.values(data).filter(v => v && typeof v === 'object');
}

function pick(obj, names) {
  for (const n of names) {
    if (obj[n] !== undefined && obj[n] !== null && String(obj[n]).trim() !== '') return obj[n];
  }
  const low = {};
  Object.keys(obj || {}).forEach(k => low[k.toLowerCase()] = obj[k]);
  for (const n of names) {
    const v = low[String(n).toLowerCase()];
    if (v !== undefined && v !== null && String(v).trim() !== '') return v;
  }
  return '';
}

async function syncLiveApiOnce() {
  const url = await loadApiUrlFromFirebase();
  if (!url) return;
  try {
    const r = await fetch(url, { cache: 'no-store' });
    const text = await r.text();
    let rows = [];
    try { rows = flattenVehiclesJson(JSON.parse(text)); }
    catch(_) { rows = parseXmlVehicles(text); }
    if (!rows.length) return;

    const defs = Object.values(vehicleDefs || {});
    const out = {};
    rows.forEach(row => {
      const tnbPlate = normalizePlate(pick(row, ['plaka','Plaka','plate','aracPlaka','arac_plaka','TNBPLAKA','tnb_plaka']));
      const deviceId = String(pick(row, ['cihaz_id','cihazId','CihazID','CihazId','deviceId','id']) || '').trim();
      const def = defs.find(d =>
        normalizePlate(d.tnb_plaka) === tnbPlate ||
        normalizePlate(d.kisa_plaka) === tnbPlate ||
        (deviceId && String(d.cihaz_id || d.device_id || '').trim() === deviceId)
      );
      const key = def ? def.kisa_plaka : (tnbPlate || deviceId);
      const lat = parseFloat(String(pick(row, ['lat','Lat','Enlem','latitude','Latitude'])).replace(',', '.'));
      const lng = parseFloat(String(pick(row, ['lng','Lng','lon','Lon','Boylam','longitude','Longitude'])).replace(',', '.'));
      if (!key || !lat || !lng) return;
      const hiz = parseInt(pick(row, ['hiz','Hiz','speed','Speed']) || 0) || 0;
      out[key] = {
        lat, lng, hiz,
        km: parseInt(pick(row, ['km','Km','KmSayaci','odometer']) || 0) || 0,
        yon: parseInt(pick(row, ['yon','Yon','direction']) || 0) || 0,
        guncelleme: pick(row, ['zaman','Zaman','time','Time','tarih','Tarih']) || new Date().toISOString(),
        durum: hiz > 3 ? 'HAREKET' : 'BEKLIYOR'
      };
    });
    if (Object.keys(out).length) {
      renderVehicles(out);
      try { await fetch(`${FB_BASE}/arac_takip/konumlar.json`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(out)}); } catch(e) {}
    }
  } catch(e) {
    console.warn('Canlı API okunamadı:', e);
  }
}

async function startLiveApiLoop() {
  await syncLiveApiOnce();
  if (liveApiTimer) clearInterval(liveApiTimer);
  liveApiTimer = setInterval(syncLiveApiOnce, 60 * 1000);
}

async function loadDashboardData() {
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('rpDate').textContent = today.replace(/-/g,'.');
  try {
    const r = await fetch(`${API_URL}?action=getAll&date=${today}&apiKey=${API_KEY}`);
    const d = await r.json();
    if (!d) return;

    // Personel
    const staff = d.staff || [];
    const bosta = staff.filter(s => !s.offToday);
    document.getElementById('rpBostaCount').textContent = bosta.length;
    document.getElementById('rpBosta').innerHTML = bosta.map(s =>
      `<span class="pill">${s.name}</span>`).join('');
    const izin = staff.filter(s => s.offToday);
    document.getElementById('rpIzin').textContent  = izin.length;
    document.getElementById('rpProgramda').textContent = 0;

    // Rezervasyon özeti
    const rez = (d.reservations || []).filter(r => r.date === today);
    document.getElementById('rpRez').textContent  = rez.length;
    document.getElementById('rpPax').textContent  = rez.reduce((s,r) => s+(parseInt(r.pax_adult)||0)+(parseInt(r.pax_child)||0), 0);
    document.getElementById('rpIceri').textContent= rez.filter(r => r.girdi && !r.cikti).length;
    document.getElementById('rpTam').textContent  = rez.filter(r => r.cikti).length;
  } catch(e) { console.warn('loadDashboardData:', e); }
}

async function fbGet(path) {
  const r = await fetch(`${FB_BASE}/${path}.json`);
  const t = await r.text();
  return t === 'null' ? null : JSON.parse(t);
}

function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371000, p = Math.PI/180;
  const a = 0.5 - Math.cos((lat2-lat1)*p)/2 +
            Math.cos(lat1*p)*Math.cos(lat2*p)*(1-Math.cos((lng2-lng1)*p))/2;
  return R * 2 * Math.asin(Math.sqrt(a));
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.opacity = '1';
  setTimeout(() => el.style.opacity = '0', 4000);
}
